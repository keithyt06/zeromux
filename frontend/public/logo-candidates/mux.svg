<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <title>ZeroMux — Mux converge</title>
  <!-- squircle tile -->
  <rect x="16" y="16" width="224" height="224" rx="56" fill="#f7b500"/>
  <!-- three multiplexed streams on the left converging into the Z diagonal -->
  <g stroke="#11161d" stroke-width="14" stroke-linecap="round" fill="none">
    <path d="M64 96 H150"/>
    <path d="M64 128 H150"/>
    <path d="M64 160 H150"/>
  </g>
  <!-- Z: top bar, converging diagonal, bottom bar (the merge target) -->
  <path d="M150 84 H196 L92 172 H188"
        fill="none" stroke="#11161d" stroke-width="20"
        stroke-linejoin="round" stroke-linecap="round"/>
</svg>
